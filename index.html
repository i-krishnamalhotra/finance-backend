<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Personal Financial Dashboard</title>
    <meta name="description" content="Offline-first personal financial dashboard with bill images and notes.">
    
    <!-- PWA Meta Tags for Native App Experience -->
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FinDash">
    
    <!-- Link to your external icon.png -->
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">

    <!-- Tailwind CSS for Premium Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a',
                        card: '#1e293b',
                        primary: '#38bdf8',
                        danger: '#f43f5e',
                        success: '#10b981',
                        warning: '#f59e0b'
                    },
                    keyframes: { scan: { '0%, 100%': { top: '0%' }, '50%': { top: '100%' } } },
                    animation: { scan: 'scan 2s ease-in-out infinite' },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        .glass-effect {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Screen-only display classes */
        @media screen {
            .print-only { display: none !important; }
        }

        /* Print Styles - Professional Portrait PDF layout */
        @media print {
            @page {
                size: A4 portrait;
                margin: 15mm;
            }
            body { 
                background: #ffffff !important; 
                color: #000000 !important; 
                padding: 0 !important;
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact;
                font-family: 'Inter', sans-serif !important;
            }
            
            /* CRITICAL FIX: Chrome fails to print elements with backdrop-filter. This removes the blur entirely for PDF. */
            * {
                backdrop-filter: none !important;
                -webkit-backdrop-filter: none !important;
            }

            .no-print { display: none !important; }
            .print-only { display: flex !important; }
            
            /* Remove padding from main wrapper to maximize space */
            .max-w-7xl { max-width: 100% !important; padding: 0 !important; margin: 0 !important; }
            
            /* Clean white cards with sharp borders */
            .print-card { 
                border: 1px solid #cbd5e1 !important; 
                box-shadow: none !important; 
                background: #ffffff !important; 
                color: #000000 !important; 
                break-inside: avoid;
                page-break-inside: avoid;
            }
            .print-text { color: #000000 !important; }
            
            /* PERFECT PORTRAIT SUMMARY GRID: 5 boxes balanced into 2 rows */
            .print-grid { 
                display: grid !important; 
                grid-template-columns: repeat(6, 1fr) !important;
                grid-template-rows: auto auto !important;
                gap: 12px !important; 
                margin-bottom: 24px !important;
            }
            .print-grid > div {
                min-width: 0 !important;
                padding: 12px !important;
                border-radius: 6px !important;
                border: 1px solid #cbd5e1 !important;
                background: #f8fafc !important; /* Light gray background for contrast */
            }
            
            /* Row 1: Starting Balance & Bank Balance */
            .print-grid > div:nth-child(1) { grid-column: 1 / span 3 !important; grid-row: 1 !important; }
            .print-grid > div:nth-child(5) { grid-column: 4 / span 3 !important; grid-row: 1 !important; background: #eff6ff !important; }
            
            /* Row 2: Incomes, Expenses, Receivables */
            .print-grid > div:nth-child(2) { grid-column: 1 / span 2 !important; grid-row: 2 !important; }
            .print-grid > div:nth-child(3) { grid-column: 3 / span 2 !important; grid-row: 2 !important; }
            .print-grid > div:nth-child(4) { grid-column: 5 / span 2 !important; grid-row: 2 !important; }
            
            /* MASONRY 2-COLUMN LAYOUT FOR LISTS to prevent weird stretching */
            .grid.lg\:grid-cols-3 {
                display: block !important;
                column-count: 2 !important;
                column-gap: 20px !important;
            }
            .grid.lg\:grid-cols-3 > div {
                break-inside: avoid !important;
                page-break-inside: avoid !important;
                margin-bottom: 20px !important;
                display: inline-block !important; /* Prevents column clipping */
                width: 100% !important;
            }
            
            /* Strip input styling so it looks like raw text */
            input, textarea { 
                border: none !important; 
                background: transparent !important; 
                color: #000000 !important; 
                padding: 0 !important; 
                resize: none; 
                overflow: hidden !important;
                font-size: 10pt !important;
                line-height: 1.4 !important;
            }
            textarea { display: block; width: 100%; white-space: pre-wrap; }
            
            /* Hide the interactive app header entirely */
            header { display: none !important; } 
            
            /* List item styling */
            #incomesBody > div, #expensesBody > div, #receivablesBody > div {
                border-bottom: 1px solid #e2e8f0 !important;
                padding: 10px 0 !important;
                background: transparent !important;
                break-inside: avoid;
                page-break-inside: avoid;
            }
            
            /* Small, neat images for PDF */
            img { 
                max-width: 50px !important; 
                max-height: 50px !important; 
                border: 1px solid #cbd5e1 !important;
                border-radius: 4px !important;
                display: inline-block !important;
            }
            
            /* Proper specific colors for print mode */
            .border-success { border-left-width: 4px !important; border-left-color: #10b981 !important; }
            .border-danger { border-left-width: 4px !important; border-left-color: #ef4444 !important; }
            .border-warning { border-left-width: 4px !important; border-left-color: #f59e0b !important; }
            .border-primary { border-left-width: 4px !important; border-left-color: #3b82f6 !important; }
            
            .text-success { color: #059669 !important; } 
            .text-danger { color: #dc2626 !important; }   
            .text-warning { color: #d97706 !important; }  
            .text-primary { color: #2563eb !important; }  
        }
    </style>
</head>

<script>
    // Initialize Lucide Icons
    lucide.createIcons();

    const KEY = 'finDash_v5'; 
    const $ = id => document.getElementById(id);
    function generateId() { return Math.random().toString(36).substr(2, 9); }

    // --- State Management ---
    let store = { activeId: '', timelines: {} };
    let data; // Pointer to the currently active timeline data

    // --- Local Storage Fallback Engine ---
    const DB_NAME = 'FinDashLocalDB';
    function initDB() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open(DB_NAME, 1);
            req.onupgradeneeded = e => e.target.result.createObjectStore('store');
            req.onsuccess = e => resolve(e.target.result);
            req.onerror = e => reject(e.target.error);
        });
    }
    async function localSaveDB(dataToSave) {
        try {
            const dbInstance = await initDB();
            const tx = dbInstance.transaction('store', 'readwrite');
            tx.objectStore('store').put(dataToSave, 'finDashStore');
            return new Promise(r => tx.oncomplete = r);
        } catch (e) { console.error("IndexedDB save failed", e); }
    }
    async function localLoadDB() {
        try {
            const dbInstance = await initDB();
            return new Promise(resolve => {
                const tx = dbInstance.transaction('store', 'readonly');
                const req = tx.objectStore('store').get('finDashStore');
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => resolve(null);
            });
        } catch (e) { return null; }
    }

    // --- Firebase Cloud Sync Engine ---
    const firebaseConfig = {
      apiKey: "AIzaSyBu920zvhivJL8IQRCcq0OcKuLjjd_FeZY",

    let db;

    function updateSyncStatusUI(isSyncing = false, isError = false, isCloud = false) {
        const span = $('syncStatus');
        if (isCloud) {
            if (isError) {
                span.innerHTML = `<i data-lucide="alert-circle" class="w-3 h-3 text-danger"></i> Sync Error`;
                span.className = "ml-2 px-2 py-0.5 rounded-full bg-danger/10 border border-danger/30 text-danger text-[10px] font-normal flex items-center gap-1 mt-1 no-print";
            } else if (isSyncing) {
                span.innerHTML = `<i data-lucide="refresh-cw" class="w-3 h-3 text-primary animate-spin"></i> Syncing...`;
                span.className = "ml-2 px-2 py-0.5 rounded-full bg-primary/10 border border-primary/30 text-primary text-[10px] font-normal flex items-center gap-1 mt-1 no-print";
            } else {
                span.innerHTML = `<i data-lucide="cloud" class="w-3 h-3 text-primary"></i> Cloud Synced`;
                span.className = "ml-2 px-2 py-0.5 rounded-full bg-primary/10 border border-primary/30 text-primary text-[10px] font-normal flex items-center gap-1 mt-1 no-print";
            }
        } else {
            span.innerHTML = `<i data-lucide="database" class="w-3 h-3 text-success"></i> Local DB Active`;
            span.className = "ml-2 px-2 py-0.5 rounded-full bg-slate-800 border border-slate-700 text-[10px] text-slate-400 font-normal flex items-center gap-1 mt-1 no-print";
        }
        lucide.createIcons();
    }

    async function initFirebase() {
        try {
            const { initializeApp } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js");
            const { getFirestore, doc, setDoc, onSnapshot } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            isCloudReady = true;
            updateSyncStatusUI(false, false, true);

            // Direct connection to a single master document
            const docRef = doc(db, 'finance_dashboard', 'my_data');
            
            onSnapshot(docRef, (docSnap) => {
                if (skipNextSnapshot) { skipNextSnapshot = false; return; }
                if (docSnap.exists()) {
                    const cloudData = docSnap.data();
                    if (cloudData && cloudData.timelines) {
                        store = cloudData;
                        if(!store.activeId || !store.timelines[store.activeId]) {
                            store.activeId = Object.keys(store.timelines)[0];
                        }
                        data = store.timelines[store.activeId];
                        localSaveDB(store); 
                        render();
                    }
                }
            }, (err) => {
                console.error("Cloud sync error:", err);
                updateSyncStatusUI(false, true, true);
            });
        } catch (e) {
            console.error("Firebase init failed:", e);
        }
    }

    // --- Global Save Logic ---
    window.save = function() {
        // 1. Always save locally immediately
        localSaveDB(store).catch(e => console.error(e));

        // 2. Push to Firebase Cloud Database
        if (isCloudReady && db) {
            updateSyncStatusUI(true, false, true);
            if (cloudSaveTimeout) clearTimeout(cloudSaveTimeout);
            cloudSaveTimeout = setTimeout(async () => {
                try {
                    const { setDoc, doc } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
                    skipNextSnapshot = true;
                    await setDoc(doc(db, 'finance_dashboard', 'my_data'), store);
                    updateSyncStatusUI(false, false, true);
                } catch(e) {
                    console.error("Cloud Save Error:", e);
                    updateSyncStatusUI(false, true, true);
                }
            }, 1500); 
        }
    };

            store = {

                        incomes: [], expenses: [], receivables: []

        if(!store.activeId || !store.timelines[store.activeId]) {

    // --- Dynamic Logic Calculations ---
    function calc() {
        const totalInc = data.incomes.reduce((s, x) => s + Number(x.amt || 0), 0);
        const totalExp = data.expenses.reduce((s, x) => s + Number(x.amt || 0), 0);
        const totalRec = data.receivables.reduce((s, x) => s + Number(x.amt || 0), 0);
        
        const startAmt = Number(data.startingAmount || 0);
        
        const currentBal = startAmt + totalInc - totalExp - totalRec;
        const totalWealth = currentBal + totalRec;

        $('totalIncomes').textContent = '₹' + totalInc.toLocaleString('en-IN');
        $('totalExpenses').textContent = '₹' + totalExp.toLocaleString('en-IN');
        $('totalReceivables').textContent = '₹' + totalRec.toLocaleString('en-IN');
        
        $('currentBalance').textContent = '₹' + currentBal.toLocaleString('en-IN');
        $('totalWealth').textContent = 'Total Asset Value: ₹' + totalWealth.toLocaleString('en-IN');
        
        window.save();
    }

    // --- Image Processing ---
    function compressImage(file, callback) {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = event => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 800; 
                const MAX_HEIGHT = 800; 
                let width = img.width;
                let height = img.height;

                if (width > height && width > MAX_WIDTH) {
                    height *= MAX_WIDTH / width;
                    width = MAX_WIDTH;
                } else if (height > MAX_HEIGHT) {
                    width *= MAX_HEIGHT / height;
                    height = MAX_HEIGHT;
                }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                callback(canvas.toDataURL('image/jpeg', 0.7)); 
            };
        };
    }

    window.addImageHandler = function(arrName, id, useCamera) {
        const item = data[arrName].find(x => x.id === id);
        if(!item) return;

        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        if (useCamera) input.capture = 'environment';

        input.onchange = e => {
            const file = e.target.files[0];
            if (!file) return;
            compressImage(file, compressedDataUrl => {
                if(!item.imgs) item.imgs = [];
                item.imgs.push(compressedDataUrl);
                window.save();
                render();
            });
        };
        input.click();
    };

    // --- Custom Camera UI Logic ---
    let cameraStream = null;
    let currentFacingMode = 'environment';
    let activeScannerTarget = { arrName: null, id: null };

    window.openScannerUI = async function(arrName, id) {
        activeScannerTarget = { arrName, id };
        $('scannerModal').classList.remove('hidden');
        startCamera();
    };

    async function startCamera() {
        if (cameraStream) {
            cameraStream.getTracks().forEach(t => t.stop());
        }
        try {
            cameraStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: currentFacingMode, width: { ideal: 1920 }, height: { ideal: 1080 } } 
            });
            $('scannerVideo').srcObject = cameraStream;
        } catch (err) {
            showDialog({ type: 'alert', title: 'Camera Error', message: 'Camera access denied or not supported on this browser. Falling back to native file picker.', confirmText: 'OK' });
            closeScanner();
            window.addImageHandler(activeScannerTarget.arrName, activeScannerTarget.id, true);
        }
    }

    window.closeScanner = function() {
        $('scannerModal').classList.add('hidden');
        if (cameraStream) {
            cameraStream.getTracks().forEach(t => t.stop());
            cameraStream = null;
        }
    };

    window.switchCamera = function() {
        currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
        startCamera();
    };

    window.captureScanner = function() {
        const video = $('scannerVideo');
        if (!video.videoWidth) return; 

        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
        closeScanner();

        const item = data[activeScannerTarget.arrName].find(x => x.id === activeScannerTarget.id);
        if (item) {
            fetch(dataUrl)
                .then(res => res.blob())
                .then(blob => {
                    compressImage(blob, finalCompressed => {
                        if(!item.imgs) item.imgs = [];
                        item.imgs.push(finalCompressed);
                        window.save();
                        render();
                    });
                });
        }
    };

    // --- PWA Implementation (Single File Strategy) ---
    function initPWA() {
        const manifest = {
            name: "Personal Financial Dashboard",
            short_name: "FinDash",
            description: "Offline-first personal financial dashboard.",
            start_url: window.location.href.split('?')[0],
            display: "standalone", // This removes the top navigation bar when installed
            background_color: "#0f172a",
            theme_color: "#0f172a",
            icons: [
                { src: "icon.png", sizes: "192x192", type: "image/png" },
                { src: "icon.png", sizes: "512x512", type: "image/png" }
            ]
        };
        
        const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/manifest+json'});
        const link = document.createElement('link');
        link.rel = 'manifest'; link.href = URL.createObjectURL(manifestBlob);
        document.head.appendChild(link);

        const swCode = `self.addEventListener('install', e => self.skipWaiting()); self.addEventListener('activate', e => self.clients.claim()); self.addEventListener('fetch', e => { e.respondWith(fetch(e.request).catch(() => caches.match(e.request))); });`;
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register(URL.createObjectURL(new Blob([swCode], {type: 'application/javascript'}))).catch(err => console.log('SW registration failed:', err));
        }

        let deferredPrompt;
        const installBtn = $('btnInstallPWA');
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            installBtn.classList.remove('hidden'); installBtn.classList.add('flex');
            lucide.createIcons();
        });

        installBtn.onclick = async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') { installBtn.classList.add('hidden'); installBtn.classList.remove('flex'); }
                deferredPrompt = null;
            }
        };
    }

    initPWA();
    bootApp(); 

</script>
</body>
</html>
