<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Personal Financial Dashboard</title>
    <meta name="description" content="Offline-first personal financial dashboard with bill images and notes.">
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FinDash">

    <!-- Tailwind CSS for Premium Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a',
                        card: '#1e293b',
                        primary: '#38bdf8',
                        danger: '#f43f5e',
                        success: '#10b981',
                        warning: '#f59e0b'
                    },
                    keyframes: { scan: { '0%, 100%': { top: '0%' }, '50%': { top: '100%' } } },
                    animation: { scan: 'scan 2s ease-in-out infinite' },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Print Styles - optimized for PDF export */
        @media print {
            body { background: white; color: black; padding: 0 !important; }
            .no-print { display: none !important; }
            .print-card { border: 1px solid #cbd5e1 !important; box-shadow: none !important; background: white !important; color: black !important; break-inside: avoid; }
            .print-text { color: black !important; }
            input, textarea { border: none !important; background: transparent !important; color: black !important; padding: 0 !important; resize: none; overflow: hidden; }
            .print-grid { display: grid !important; grid-template-columns: repeat(2, minmax(0, 1fr)) !important; gap: 1rem !important; }
        }

        .glass-effect {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="min-h-screen p-3 md:p-8 font-sans pb-24">

<div class="max-w-7xl mx-auto space-y-6">
    
    <!-- Header Section -->
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-card p-5 md:p-6 rounded-2xl shadow-lg border border-slate-800 print-card">
        <div class="w-full md:w-auto">
            <h1 class="text-xl md:text-2xl font-bold flex items-center gap-2 print-text">
                <i data-lucide="wallet" class="text-primary no-print"></i>
                Financial Dashboard
                <span id="syncStatus" class="ml-2 px-2 py-0.5 rounded-full bg-slate-800 border border-slate-700 text-[10px] text-slate-400 font-normal flex items-center gap-1 mt-1 no-print">
                    <i data-lucide="database" class="w-3 h-3 text-success"></i> Local DB Active
                </span>
            </h1>
            
            <!-- TIMELINE & SETTINGS CONTROLS -->
            <div class="flex items-center gap-2 mt-3 no-print bg-slate-900 p-2 rounded-lg border border-slate-700 overflow-x-auto">
                <i data-lucide="calendar" class="w-4 h-4 text-slate-400 ml-1 shrink-0"></i>
                <select id="timelineSelector" class="bg-transparent text-sm text-white font-medium focus:outline-none cursor-pointer border-r border-slate-700 pr-2 shrink-0">
                    <!-- Options populated by JS -->
                </select>
                <button onclick="createTimeline()" class="p-1.5 bg-slate-800 hover:bg-slate-700 rounded-md text-primary transition-colors shrink-0 flex items-center gap-1 text-xs" title="New Timeline Sheet">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i> New Sheet
                </button>
                <button onclick="renameTimeline()" class="p-1.5 bg-slate-800 hover:bg-slate-700 rounded-md text-slate-300 transition-colors shrink-0" title="Rename Sheet">
                    <i data-lucide="edit-2" class="w-4 h-4"></i>
                </button>
                <button onclick="deleteTimeline()" class="p-1.5 bg-slate-800 hover:bg-danger/80 rounded-md text-danger hover:text-white transition-colors shrink-0" title="Delete Sheet">
                    <i data-lucide="trash" class="w-4 h-4"></i>
                </button>
                
                <div class="w-px h-5 bg-slate-700 mx-1 shrink-0"></div>
                
                <button onclick="configureRender()" class="p-1.5 bg-indigo-500/20 hover:bg-indigo-500/40 border border-indigo-500/30 rounded-md text-indigo-300 transition-colors shrink-0 flex items-center gap-1 text-xs" title="Connect to Render Backend">
                    <i data-lucide="server" class="w-4 h-4"></i> Setup Render DB
                </button>
            </div>
        </div>

        <div class="flex flex-wrap gap-2 md:gap-3 w-full md:w-auto no-print">
            <button id="btnInstallPWA" class="hidden flex-1 md:flex-none justify-center items-center gap-2 px-3 py-2 bg-success/20 hover:bg-success/30 text-success border border-success/50 rounded-lg transition-colors text-xs md:text-sm font-medium" title="Install App">
                <i data-lucide="smartphone" class="w-4 h-4"></i> Install App
            </button>
            <button onclick="window.print()" class="flex-1 md:flex-none justify-center flex items-center gap-2 px-3 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg transition-colors text-xs md:text-sm font-medium">
                <i data-lucide="file-text" class="w-4 h-4"></i> Export PDF
            </button>
            <button id="btnExportJSON" class="flex-1 md:flex-none justify-center flex items-center gap-2 px-3 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg transition-colors text-xs md:text-sm font-medium">
                <i data-lucide="download" class="w-4 h-4"></i> Backup
            </button>
            <button id="btnImportJSON" class="flex-1 md:flex-none justify-center flex items-center gap-2 px-3 py-2 bg-primary hover:bg-sky-400 text-dark rounded-lg transition-colors text-xs md:text-sm font-medium">
                <i data-lucide="upload" class="w-4 h-4"></i> Restore
            </button>
            <input type="file" id="fileInput" accept="application/json" class="hidden">
        </div>
    </header>

    <!-- PDF Title (Only visible when printing) -->
    <div class="hidden print:block text-center border-b-2 border-slate-300 pb-4 mb-4">
        <h2 id="printTitle" class="text-3xl font-bold text-black uppercase tracking-wider">Financial Report</h2>
        <p class="text-sm text-slate-600 mt-1">Generated from Personal Financial Dashboard</p>
    </div>

    <!-- Summary Overview -->
    <section class="grid grid-cols-2 lg:grid-cols-5 gap-3 md:gap-4 print-grid">
        <!-- Starting Balance Input -->
        <div class="col-span-2 lg:col-span-1 glass-effect p-4 md:p-5 rounded-2xl shadow-lg print-card flex flex-col justify-center">
            <label class="text-slate-400 text-xs md:text-sm font-medium mb-2 uppercase tracking-wider print-text">Starting Balance</label>
            <div class="relative">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">₹</span>
                <input id="startingAmount" type="number" class="w-full bg-slate-900 border border-slate-700 rounded-lg pl-8 pr-3 py-2 text-lg md:text-xl font-bold focus:ring-2 focus:ring-primary focus:border-primary transition-all print-text">
            </div>
        </div>

        <!-- Calculated Summaries -->
        <div class="glass-effect p-4 md:p-5 rounded-2xl shadow-lg border-l-4 border-success print-card">
            <p class="text-slate-400 text-xs font-medium mb-1 uppercase tracking-wider print-text">Total Income (+)</p>
            <h2 id="totalIncomes" class="text-xl md:text-2xl font-bold text-success print-text">₹0</h2>
        </div>
        
        <div class="glass-effect p-4 md:p-5 rounded-2xl shadow-lg border-l-4 border-danger print-card">
            <p class="text-slate-400 text-xs font-medium mb-1 uppercase tracking-wider print-text">Expenses (-)</p>
            <h2 id="totalExpenses" class="text-xl md:text-2xl font-bold text-danger print-text">₹0</h2>
        </div>

        <div class="glass-effect p-4 md:p-5 rounded-2xl shadow-lg border-l-4 border-warning print-card">
            <p class="text-slate-400 text-xs font-medium mb-1 uppercase tracking-wider print-text" title="Money lent out or cash withdrawn">Cash / Debt (-)</p>
            <h2 id="totalReceivables" class="text-xl md:text-2xl font-bold text-warning print-text">₹0</h2>
        </div>

        <div class="col-span-2 lg:col-span-1 glass-effect p-4 md:p-5 rounded-2xl shadow-lg border-l-4 border-primary print-card bg-primary/5">
            <p class="text-slate-400 text-xs font-medium mb-1 uppercase tracking-wider print-text">Bank Balance</p>
            <h2 id="currentBalance" class="text-2xl md:text-3xl font-bold text-primary print-text">₹0</h2>
            <p id="totalWealth" class="text-xs text-slate-500 mt-1 print-text">Total Wealth: ₹0</p>
        </div>
    </section>

    <!-- Main Content Area: 3 Columns / Rows -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- INCOMES BLOCK -->
        <div class="bg-card rounded-2xl shadow-xl border border-slate-800 flex flex-col print-card">
            <div class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-800/20 rounded-t-2xl">
                <h3 class="text-md md:text-lg font-bold flex items-center gap-2 print-text">
                    <i data-lucide="arrow-down-to-line" class="text-success no-print w-5 h-5"></i> Incomes
                </h3>
            </div>
            <!-- Add Form -->
            <div class="p-3 no-print border-b border-slate-800 bg-slate-900/30">
                <div class="flex flex-col sm:flex-row gap-2">
                    <input id="newIncName" placeholder="Source (e.g. Salary)" class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-success">
                    <input id="newIncAmt" type="number" placeholder="Amount (₹)" class="w-full sm:w-28 bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-success">
                    <button id="addIncome" class="bg-success hover:bg-emerald-500 text-dark px-4 py-2 rounded-lg font-medium transition-colors flex items-center justify-center gap-1 text-sm w-full sm:w-auto">
                        <i data-lucide="plus" class="w-4 h-4"></i> Add
                    </button>
                </div>
            </div>
            <!-- List -->
            <div id="incomesBody" class="flex flex-col divide-y divide-slate-800/50 p-2 text-sm"></div>
        </div>

        <!-- EXPENSES BLOCK -->
        <div class="bg-card rounded-2xl shadow-xl border border-slate-800 flex flex-col print-card">
            <div class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-800/20 rounded-t-2xl">
                <h3 class="text-md md:text-lg font-bold flex items-center gap-2 print-text">
                    <i data-lucide="arrow-up-from-line" class="text-danger no-print w-5 h-5"></i> Expenses
                </h3>
            </div>
            <!-- Add Form -->
            <div class="p-3 no-print border-b border-slate-800 bg-slate-900/30">
                <div class="flex flex-col sm:flex-row gap-2">
                    <input id="newExpName" placeholder="What did you spend on?" class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-danger">
                    <input id="newExpAmt" type="number" placeholder="Amount (₹)" class="w-full sm:w-28 bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-danger">
                    <button id="addExpense" class="bg-danger hover:bg-rose-500 text-white px-4 py-2 rounded-lg font-medium transition-colors flex items-center justify-center gap-1 text-sm w-full sm:w-auto">
                        <i data-lucide="plus" class="w-4 h-4"></i> Add
                    </button>
                </div>
            </div>
            <!-- List -->
            <div id="expensesBody" class="flex flex-col divide-y divide-slate-800/50 p-2 text-sm"></div>
        </div>

        <!-- RECEIVABLES / DEBT / CASH BLOCK -->
        <div class="bg-card rounded-2xl shadow-xl border border-slate-800 flex flex-col print-card">
            <div class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-800/20 rounded-t-2xl">
                <h3 class="text-md md:text-lg font-bold flex items-center gap-2 print-text">
                    <i data-lucide="banknote" class="text-warning no-print w-5 h-5"></i> Receivables / Cash Out
                </h3>
            </div>
            <!-- Add Form -->
            <div class="p-3 no-print border-b border-slate-800 bg-slate-900/30">
                <div class="flex flex-col sm:flex-row gap-2">
                    <input id="newRecName" placeholder="Who/What? (e.g. ATM)" class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-warning">
                    <input id="newRecAmt" type="number" placeholder="Amount (₹)" class="w-full sm:w-28 bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-warning">
                    <button id="addReceivable" class="bg-warning hover:bg-amber-400 text-dark px-4 py-2 rounded-lg font-medium transition-colors flex items-center justify-center gap-1 text-sm w-full sm:w-auto">
                        <i data-lucide="plus" class="w-4 h-4"></i> Add
                    </button>
                </div>
            </div>
            <!-- List -->
            <div id="receivablesBody" class="flex flex-col divide-y divide-slate-800/50 p-2 text-sm"></div>
        </div>

    </div>

    <!-- Image Modal for Fullscreen Preview -->
    <div id="imageModal" class="fixed inset-0 bg-black/95 hidden z-[100] flex items-center justify-center p-2 backdrop-blur-md no-print">
        <button onclick="closeModal()" class="absolute top-4 right-4 bg-slate-800 text-white rounded-full p-2 hover:bg-slate-700 transition-colors">
            <i data-lucide="x" class="w-6 h-6"></i>
        </button>
        <img id="modalImage" src="" class="max-w-full max-h-[90vh] object-contain rounded-lg">
    </div>

    <!-- Custom Camera Scanner Modal -->
    <div id="scannerModal" class="fixed inset-0 bg-black z-[200] hidden flex-col no-print">
        <div class="relative flex-1 overflow-hidden bg-black">
            <video id="scannerVideo" class="w-full h-full object-cover" autoplay playsinline></video>
            <!-- Scanner Overlay -->
            <div class="absolute inset-0 pointer-events-none flex items-center justify-center border-[20px] md:border-[40px] border-black/60">
                <div class="w-full h-[60%] md:h-full border-2 border-primary shadow-[0_0_0_9999px_rgba(0,0,0,0.6)] flex items-center justify-center relative overflow-hidden rounded-lg">
                    <div class="w-full h-1 bg-primary/80 absolute shadow-[0_0_10px_#38bdf8] animate-scan"></div>
                    <div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-primary"></div>
                    <div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-primary"></div>
                    <div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-primary"></div>
                    <div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-primary"></div>
                </div>
            </div>
            <div class="absolute top-4 right-4 z-10">
                <button onclick="closeScanner()" class="text-white p-3 rounded-full bg-slate-800/80 hover:bg-slate-700 backdrop-blur-sm">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
        </div>
        <div class="h-28 bg-black flex items-center justify-around px-6 pb-4">
            <div class="w-12"></div>
            <button onclick="captureScanner()" class="w-16 h-16 rounded-full bg-transparent border-4 border-slate-300 flex items-center justify-center hover:border-white active:scale-95 transition-all">
                <div class="w-12 h-12 rounded-full bg-primary/90 border-2 border-transparent"></div>
            </button>
            <button onclick="switchCamera()" class="text-white p-3 rounded-full bg-slate-800/80 hover:bg-slate-700 backdrop-blur-sm">
                <i data-lucide="refresh-cw" class="w-6 h-6"></i>
            </button>
        </div>
    </div>

    <!-- Custom Dialog Modal -->
    <div id="dialogModal" class="fixed inset-0 bg-black/80 z-[300] hidden flex items-center justify-center p-4 backdrop-blur-sm no-print">
        <div class="bg-card border border-slate-700 rounded-xl p-6 w-full max-w-sm shadow-2xl">
            <h3 id="dialogTitle" class="text-lg font-bold mb-2">Title</h3>
            <p id="dialogMessage" class="text-sm text-slate-400 mb-4">Message</p>
            <input id="dialogInput" type="text" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary mb-4 hidden" autocomplete="off">
            <div class="flex justify-end gap-2">
                <button id="dialogCancel" class="px-4 py-2 rounded-lg text-sm font-medium bg-slate-800 hover:bg-slate-700 transition-colors">Cancel</button>
                <button id="dialogConfirm" class="px-4 py-2 rounded-lg text-sm font-medium transition-colors">Confirm</button>
            </div>
        </div>
    </div>

</div>

<script>
    // Initialize Lucide Icons
    lucide.createIcons();

    const KEY = 'finDash_v5'; 
    
    const $ = id => document.getElementById(id);
    function generateId() { return Math.random().toString(36).substr(2, 9); }

    // --- State Management ---
    let store = { activeId: '', timelines: {} };
    let data; // Pointer to the currently active timeline data

    // --- IndexedDB Local Storage Engine ---
    const DB_NAME = 'FinDashLocalDB';
    function initDB() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open(DB_NAME, 1);
            req.onupgradeneeded = e => e.target.result.createObjectStore('store');
            req.onsuccess = e => resolve(e.target.result);
            req.onerror = e => reject(e.target.error);
        });
    }

    async function localSaveDB(dataToSave) {
        try {
            const dbInstance = await initDB();
            const tx = dbInstance.transaction('store', 'readwrite');
            tx.objectStore('store').put(dataToSave, 'finDashStore');
            return new Promise(r => tx.oncomplete = r);
        } catch (e) { console.error("IndexedDB save failed", e); }
    }

    async function localLoadDB() {
        try {
            const dbInstance = await initDB();
            return new Promise(resolve => {
                const tx = dbInstance.transaction('store', 'readonly');
                const req = tx.objectStore('store').get('finDashStore');
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => resolve(null);
            });
        } catch (e) { return null; }
    }

    // --- Render.com Backend Connector Logic ---
    let renderApiUrl = localStorage.getItem('finDash_render_url') || '';

    window.configureRender = function() {
        showDialog({
            type: 'prompt',
            title: 'Connect to Render DB',
            message: 'Enter your Render Backend API URL. Leave blank to disable and return to purely Local DB mode.',
            defaultValue: renderApiUrl,
            confirmText: 'Connect',
            onConfirm: (url) => {
                renderApiUrl = url.trim();
                localStorage.setItem('finDash_render_url', renderApiUrl);
                bootApp(); // Restart app to attempt cloud fetch
            }
        });
    };

    function updateRenderStatusUI(isError = false) {
        const span = $('syncStatus');
        if(renderApiUrl) {
            if(isError) {
                span.innerHTML = `<i data-lucide="server-crash" class="w-3 h-3 text-danger"></i> Render Error`;
                span.className = "ml-2 px-2 py-0.5 rounded-full bg-danger/10 border border-danger/30 text-danger text-[10px] font-normal flex items-center gap-1 mt-1 no-print";
            } else {
                span.innerHTML = `<i data-lucide="server" class="w-3 h-3 text-indigo-400"></i> Render DB Active`;
                span.className = "ml-2 px-2 py-0.5 rounded-full bg-indigo-500/10 border border-indigo-500/30 text-indigo-400 text-[10px] font-normal flex items-center gap-1 mt-1 no-print";
            }
        } else {
            span.innerHTML = `<i data-lucide="database" class="w-3 h-3 text-success"></i> Local DB Active`;
            span.className = "ml-2 px-2 py-0.5 rounded-full bg-slate-800 border border-slate-700 text-[10px] text-slate-400 font-normal flex items-center gap-1 mt-1 no-print";
        }
        lucide.createIcons();
    }

    let renderSaveTimeout = null;
    
    // --- Global Save Logic ---
    window.save = function() {
        // Always save locally to IndexedDB as a backup
        localSaveDB(store).catch(e => console.error(e));

        // If Render URL is configured, push to the cloud DB
        if (renderApiUrl) {
            updateRenderStatusUI(false);
            if (renderSaveTimeout) clearTimeout(renderSaveTimeout);
            renderSaveTimeout = setTimeout(async () => {
                try {
                    const response = await fetch(renderApiUrl + '/api/data', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(store)
                    });
                    if(!response.ok) throw new Error("Render save rejected.");
                } catch(e) {
                    console.warn("Render Cloud Save Failed", e);
                    updateRenderStatusUI(true);
                }
            }, 1000); // Debounce network requests
        }
    };

    async function loadFromRenderDB() {
        if(!renderApiUrl) return null;
        try {
            const res = await fetch(renderApiUrl + '/api/data');
            if(res.ok) return await res.json();
        } catch(e) { 
            console.warn("Render Cloud Load Failed", e); 
            updateRenderStatusUI(true);
        }
        return null;
    }

    // --- Boot Sequence ---
    async function bootApp() {
        updateRenderStatusUI();
        
        // Try Render DB first, fallback to Local IndexedDB
        let savedStore = await loadFromRenderDB();
        
        if (!savedStore || !savedStore.timelines) {
            savedStore = await localLoadDB();
        }

        if (savedStore && savedStore.timelines) {
            store = savedStore;
        } else {
            // Brand new setup
            const defaultId = generateId();
            store = {
                activeId: defaultId,
                timelines: {
                    [defaultId]: {
                        title: 'Current Sheet',
                        startingAmount: 0,
                        incomes: [], expenses: [], receivables: []
                    }
                }
            };
        }

        if(!store.activeId || !store.timelines[store.activeId]) {
            store.activeId = Object.keys(store.timelines)[0];
        }
        data = store.timelines[store.activeId];

        render();
    }

    // --- Custom Dialog System ---
    function showDialog(opts) {
        $('dialogTitle').textContent = opts.title || 'Dialog';
        if (opts.message) {
            $('dialogMessage').textContent = opts.message;
            $('dialogMessage').classList.remove('hidden');
        } else {
            $('dialogMessage').classList.add('hidden');
        }
        
        if (opts.type === 'prompt') {
            $('dialogInput').classList.remove('hidden');
            $('dialogInput').value = opts.defaultValue || '';
            setTimeout(() => $('dialogInput').focus(), 100);
        } else {
            $('dialogInput').classList.add('hidden');
        }
        
        $('dialogConfirm').textContent = opts.confirmText || 'OK';
        $('dialogConfirm').className = opts.danger 
            ? 'px-4 py-2 rounded-lg text-sm font-medium bg-danger hover:bg-rose-500 text-white transition-colors'
            : 'px-4 py-2 rounded-lg text-sm font-medium bg-primary text-dark hover:bg-sky-400 transition-colors';
            
        if (opts.type === 'alert') {
            $('dialogCancel').classList.add('hidden');
        } else {
            $('dialogCancel').classList.remove('hidden');
        }
        
        $('dialogModal').classList.remove('hidden');
        
        const confirmBtn = $('dialogConfirm');
        const newConfirmBtn = confirmBtn.cloneNode(true);
        confirmBtn.parentNode.replaceChild(newConfirmBtn, confirmBtn);
        
        const cancelBtn = $('dialogCancel');
        const newCancelBtn = cancelBtn.cloneNode(true);
        cancelBtn.parentNode.replaceChild(newCancelBtn, cancelBtn);

        $('dialogCancel').onclick = () => $('dialogModal').classList.add('hidden');
        $('dialogConfirm').onclick = () => {
            const val = $('dialogInput').value;
            $('dialogModal').classList.add('hidden');
            if (opts.onConfirm) opts.onConfirm(val);
        };
    }

    // --- Timeline Functions ---
    function populateTimelines() {
        const select = $('timelineSelector');
        select.innerHTML = '';
        Object.keys(store.timelines).forEach(id => {
            const opt = document.createElement('option');
            opt.value = id;
            opt.textContent = store.timelines[id].title;
            if (id === store.activeId) opt.selected = true;
            select.appendChild(opt);
        });
        
        $('printTitle').textContent = store.timelines[store.activeId].title + " - Financial Report";
    }

    $('timelineSelector').onchange = (e) => {
        store.activeId = e.target.value;
        data = store.timelines[store.activeId];
        window.save();
        render();
    };

    window.createTimeline = function() {
        showDialog({
            type: 'prompt',
            title: 'New Timeline Sheet',
            message: 'Enter a name for the new sheet (e.g. March 2026):',
            confirmText: 'Create',
            onConfirm: (title) => {
                if (!title || title.trim() === '') return;
                const newId = generateId();
                store.timelines[newId] = {
                    title: title.trim(),
                    startingAmount: 0,
                    incomes: [], expenses: [], receivables: []
                };
                store.activeId = newId;
                data = store.timelines[newId];
                window.save();
                render();
            }
        });
    };

    window.renameTimeline = function() {
        showDialog({
            type: 'prompt',
            title: 'Rename Sheet',
            defaultValue: store.timelines[store.activeId].title,
            confirmText: 'Save',
            onConfirm: (newTitle) => {
                if (newTitle && newTitle.trim() !== '') {
                    store.timelines[store.activeId].title = newTitle.trim();
                    window.save();
                    populateTimelines();
                }
            }
        });
    };

    window.deleteTimeline = function() {
        if (Object.keys(store.timelines).length <= 1) {
            showDialog({ type: 'alert', title: 'Cannot Delete', message: 'You cannot delete your only sheet. Rename it or create a new one first.', confirmText: 'OK' });
            return;
        }
        
        showDialog({
            type: 'confirm',
            title: 'Delete Sheet',
            message: `Are you sure you want to completely delete "${store.timelines[store.activeId].title}"?`,
            confirmText: 'Delete',
            danger: true,
            onConfirm: () => {
                delete store.timelines[store.activeId];
                store.activeId = Object.keys(store.timelines)[0]; // Fallback to first available
                data = store.timelines[store.activeId];
                window.save();
                render();
            }
        });
    };

    // --- Dynamic Logic Calculations ---
    function calc() {
        const totalInc = data.incomes.reduce((s, x) => s + Number(x.amt || 0), 0);
        const totalExp = data.expenses.reduce((s, x) => s + Number(x.amt || 0), 0);
        const totalRec = data.receivables.reduce((s, x) => s + Number(x.amt || 0), 0);
        
        const startAmt = Number(data.startingAmount || 0);
        
        const currentBal = startAmt + totalInc - totalExp - totalRec;
        const totalWealth = currentBal + totalRec;

        $('totalIncomes').textContent = '₹' + totalInc.toLocaleString('en-IN');
        $('totalExpenses').textContent = '₹' + totalExp.toLocaleString('en-IN');
        $('totalReceivables').textContent = '₹' + totalRec.toLocaleString('en-IN');
        
        $('currentBalance').textContent = '₹' + currentBal.toLocaleString('en-IN');
        $('totalWealth').textContent = 'Total Asset Value: ₹' + totalWealth.toLocaleString('en-IN');
        
        window.save();
    }

    // --- Image Processing ---
    function compressImage(file, callback) {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = event => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 800; 
                const MAX_HEIGHT = 800; 
                let width = img.width;
                let height = img.height;

                if (width > height && width > MAX_WIDTH) {
                    height *= MAX_WIDTH / width;
                    width = MAX_WIDTH;
                } else if (height > MAX_HEIGHT) {
                    width *= MAX_HEIGHT / height;
                    height = MAX_HEIGHT;
                }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                callback(canvas.toDataURL('image/jpeg', 0.7)); 
            };
        };
    }

    window.addImageHandler = function(arrName, id, useCamera) {
        const item = data[arrName].find(x => x.id === id);
        if(!item) return;

        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        if (useCamera) input.capture = 'environment';

        input.onchange = e => {
            const file = e.target.files[0];
            if (!file) return;
            compressImage(file, compressedDataUrl => {
                if(!item.imgs) item.imgs = [];
                item.imgs.push(compressedDataUrl);
                window.save();
                render();
            });
        };
        input.click();
    };

    // --- Custom Camera UI Logic ---
    let cameraStream = null;
    let currentFacingMode = 'environment';
    let activeScannerTarget = { arrName: null, id: null };

    window.openScannerUI = async function(arrName, id) {
        activeScannerTarget = { arrName, id };
        $('scannerModal').classList.remove('hidden');
        startCamera();
    };

    async function startCamera() {
        if (cameraStream) {
            cameraStream.getTracks().forEach(t => t.stop());
        }
        try {
            cameraStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: currentFacingMode, width: { ideal: 1920 }, height: { ideal: 1080 } } 
            });
            $('scannerVideo').srcObject = cameraStream;
        } catch (err) {
            showDialog({ type: 'alert', title: 'Camera Error', message: 'Camera access denied or not supported on this browser. Falling back to native file picker.', confirmText: 'OK' });
            closeScanner();
            window.addImageHandler(activeScannerTarget.arrName, activeScannerTarget.id, true);
        }
    }

    window.closeScanner = function() {
        $('scannerModal').classList.add('hidden');
        if (cameraStream) {
            cameraStream.getTracks().forEach(t => t.stop());
            cameraStream = null;
        }
    };

    window.switchCamera = function() {
        currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
        startCamera();
    };

    window.captureScanner = function() {
        const video = $('scannerVideo');
        if (!video.videoWidth) return; 

        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
        closeScanner();

        const item = data[activeScannerTarget.arrName].find(x => x.id === activeScannerTarget.id);
        if (item) {
            fetch(dataUrl)
                .then(res => res.blob())
                .then(blob => {
                    compressImage(blob, finalCompressed => {
                        if(!item.imgs) item.imgs = [];
                        item.imgs.push(finalCompressed);
                        window.save();
                        render();
                    });
                });
        }
    };

    window.removeImage = function(arrName, id, imgIndex) {
        showDialog({
            type: 'confirm',
            title: 'Delete Image',
            message: 'Are you sure you want to delete this bill image?',
            danger: true,
            confirmText: 'Delete',
            onConfirm: () => {
                const item = data[arrName].find(x => x.id === id);
                if(item && item.imgs) {
                    item.imgs.splice(imgIndex, 1);
                    window.save();
                    render();
                }
            }
        });
    };

    window.removeEntry = function(arrName, id) {
        showDialog({
            type: 'confirm',
            title: 'Delete Entry',
            message: 'Are you sure you want to delete this entire entry?',
            danger: true,
            confirmText: 'Delete',
            onConfirm: () => {
                data[arrName] = data[arrName].filter(x => x.id !== id);
                window.save();
                render();
            }
        });
    };

    window.updateItem = function(arrName, id, field, value) {
        const item = data[arrName].find(x => x.id === id);
        if(item) {
            if(field === 'amt') item.amt = Number(value || 0);
            else item[field] = value;
            window.save();
            if(field === 'amt') calc();
        }
    };

    // --- UI Modals ---
    window.openModal = function(src) {
        $('modalImage').src = src;
        $('imageModal').classList.remove('hidden');
    }

    window.closeModal = function() {
        $('imageModal').classList.add('hidden');
        $('modalImage').src = '';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // --- Render Cards ---
    function renderCards(arrName, container) {
        const arr = data[arrName];
        container.innerHTML = '';
        
        if(arr.length === 0) {
            container.innerHTML = `<div class="p-6 text-center text-slate-500 italic text-sm">No entries yet.</div>`;
            return;
        }

        arr.forEach((x) => {
            const card = document.createElement('div');
            card.className = "flex flex-col p-3 gap-2 border-b border-slate-800/50 bg-slate-800/10 print:border-b print:border-slate-300";
            
            const imagesList = x.imgs || [];
            let imagesHTML = imagesList.map((src, imgIdx) => `
                <div class="relative inline-block flex-shrink-0 mt-1">
                    <img class="w-12 h-12 md:w-14 md:h-14 object-cover rounded-md cursor-pointer border border-slate-700 shadow-sm" src="${src}" onclick="openModal('${src}')" title="Click to view">
                    <button onclick="removeImage('${arrName}', '${x.id}', ${imgIdx})" class="absolute -top-2 -right-2 bg-danger text-white rounded-full w-5 h-5 flex items-center justify-center shadow-md no-print">
                        <i data-lucide="x" class="w-3 h-3"></i>
                    </button>
                </div>
            `).join('');

            card.innerHTML = `
                <!-- Top Row: Name & Amount -->
                <div class="flex justify-between items-start gap-2">
                    <input oninput="updateItem('${arrName}', '${x.id}', 'name', this.value)" class="flex-1 bg-transparent border-b border-transparent hover:border-slate-700 focus:border-primary outline-none transition-all py-1 font-medium truncate print-text" value="${x.name}">
                    <div class="flex items-center gap-1 font-bold text-base print-text">
                        <span class="text-slate-500">₹</span>
                        <input oninput="updateItem('${arrName}', '${x.id}', 'amt', this.value)" type="number" class="w-20 md:w-24 bg-transparent border-b border-transparent hover:border-slate-700 focus:border-primary outline-none transition-all py-1 text-right" value="${x.amt}">
                    </div>
                </div>
                
                <!-- Middle Row: Notes -->
                <div>
                    <textarea oninput="updateItem('${arrName}', '${x.id}', 'notes', this.value)" rows="1" class="w-full bg-transparent border-b border-transparent hover:border-slate-700 focus:border-primary outline-none transition-all py-1 text-xs text-slate-400 print-text" placeholder="Add notes...">${x.notes || ''}</textarea>
                </div>
                
                <!-- Bottom Row: Images & Actions -->
                <div class="flex justify-between items-end gap-2 mt-1">
                    <div class="flex flex-wrap items-center gap-2 overflow-x-auto pb-1">
                        ${imagesHTML}
                        <div class="flex gap-1.5 no-print mt-1">
                            <button onclick="openScannerUI('${arrName}', '${x.id}')" class="bg-slate-700 hover:bg-slate-600 text-primary rounded-md px-2 py-1 flex flex-col items-center justify-center transition-colors text-[10px] w-12 md:w-14 h-11 md:h-12 shadow-sm" title="Scan with Camera">
                                <i data-lucide="camera" class="w-4 h-4 mb-0.5"></i> Scan
                            </button>
                            <button onclick="addImageHandler('${arrName}', '${x.id}', false)" class="bg-slate-700 hover:bg-slate-600 text-slate-300 rounded-md px-2 py-1 flex flex-col items-center justify-center transition-colors text-[10px] w-12 md:w-14 h-11 md:h-12 shadow-sm" title="Upload File">
                                <i data-lucide="image" class="w-4 h-4 mb-0.5"></i> File
                            </button>
                        </div>
                    </div>
                    <button onclick="removeEntry('${arrName}', '${x.id}')" class="text-slate-400 hover:text-white bg-slate-800 hover:bg-danger p-2.5 rounded-md transition-colors flex-shrink-0 no-print shadow-sm mb-1" title="Delete Entry">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </div>
            `;
            
            container.appendChild(card);
        });
        
        lucide.createIcons();
    }

    // --- Main Render Routine ---
    function render() {
        populateTimelines();
        $('startingAmount').value = data.startingAmount || 0;
        
        if(!data.incomes) data.incomes = [];
        data.incomes.forEach(x => { if(!x.id) x.id = generateId(); if(!x.imgs) x.imgs=[]; });
        data.expenses.forEach(x => { if(!x.id) x.id = generateId(); if(!x.imgs) x.imgs=[]; });
        data.receivables.forEach(x => { if(!x.id) x.id = generateId(); if(!x.imgs) x.imgs=[]; });

        renderCards('incomes', $('incomesBody'));
        renderCards('expenses', $('expensesBody'));
        renderCards('receivables', $('receivablesBody'));
        
        calc();
    }

    // --- Bind Global Inputs & Buttons ---
    $('startingAmount').oninput = e => { data.startingAmount = Number(e.target.value || 0); calc(); }
    
    function handleAdd(nameId, amtId, arrName) {
        const name = $(nameId).value;
        const amt = Number($(amtId).value || 0);
        if (!name || !amt) {
            showDialog({ type: 'alert', title: 'Missing Information', message: 'Please enter a valid description and amount.', confirmText: 'OK' });
            return;
        }
        data[arrName].unshift({ id: generateId(), name, amt, notes: '', imgs: [] });
        $(nameId).value = ''; $(amtId).value = '';
        window.save(); render();
    }

    $('addIncome').onclick = () => handleAdd('newIncName', 'newIncAmt', 'incomes');
    $('addExpense').onclick = () => handleAdd('newExpName', 'newExpAmt', 'expenses');
    $('addReceivable').onclick = () => handleAdd('newRecName', 'newRecAmt', 'receivables');

    $('newIncAmt').addEventListener('keypress', e => { if (e.key === 'Enter') $('addIncome').click(); });
    $('newExpAmt').addEventListener('keypress', e => { if (e.key === 'Enter') $('addExpense').click(); });
    $('newRecAmt').addEventListener('keypress', e => { if (e.key === 'Enter') $('addReceivable').click(); });

    // --- Export / Import ---
    $('btnExportJSON').onclick = () => {
        const blob = new Blob([JSON.stringify(store, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `financial_backup_${new Date().toISOString().split('T')[0]}.json`;
        a.click(); URL.revokeObjectURL(url);
    };
    
    $('btnImportJSON').onclick = () => $('fileInput').click();
    
    $('fileInput').onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
            showDialog({
                type: 'confirm',
                title: 'Import Data',
                message: 'Warning: This will replace ALL sheets on this dashboard. Continue?',
                danger: true,
                confirmText: 'Import',
                onConfirm: () => {
                    try {
                        const parsed = JSON.parse(reader.result);
                        if(parsed.timelines) {
                            store = parsed; 
                        } else {
                            const defaultId = generateId();
                            store = { activeId: defaultId, timelines: { [defaultId]: parsed } };
                        }
                        data = store.timelines[store.activeId];
                        window.save(); render();
                    } catch (err) {
                        showDialog({ type: 'alert', title: 'Error', message: 'Invalid file format.', confirmText: 'OK' });
                    }
                }
            });
            $('fileInput').value = ''; 
        };
        reader.readAsText(file);
    };

    // --- PWA Implementation (Single File Strategy) ---
    function initPWA() {
        const svgIcon = encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5H5a2 2 0 0 1 0-4h16V5"/></svg>`);
        const manifest = {
            name: "Personal Financial Dashboard",
            short_name: "FinDash",
            description: "Offline-first personal financial dashboard.",
            start_url: window.location.href.split('?')[0],
            display: "standalone",
            background_color: "#0f172a",
            theme_color: "#0f172a",
            icons: [{ src: `data:image/svg+xml;charset=utf-8,${svgIcon}`, sizes: "192x192 512x512", type: "image/svg+xml", purpose: "any maskable" }]
        };
        
        const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/manifest+json'});
        const link = document.createElement('link');
        link.rel = 'manifest'; link.href = URL.createObjectURL(manifestBlob);
        document.head.appendChild(link);

        const swCode = `self.addEventListener('install', e => self.skipWaiting()); self.addEventListener('activate', e => self.clients.claim()); self.addEventListener('fetch', e => { e.respondWith(fetch(e.request).catch(() => caches.match(e.request))); });`;
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register(URL.createObjectURL(new Blob([swCode], {type: 'application/javascript'}))).catch(err => console.log('SW registration failed:', err));
        }

        let deferredPrompt;
        const installBtn = $('btnInstallPWA');
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            installBtn.classList.remove('hidden'); installBtn.classList.add('flex');
            lucide.createIcons();
        });

        installBtn.onclick = async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') { installBtn.classList.add('hidden'); installBtn.classList.remove('flex'); }
                deferredPrompt = null;
            }
        };
    }

    initPWA();
    bootApp(); 

</script>
</body>
